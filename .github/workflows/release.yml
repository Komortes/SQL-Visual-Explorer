name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: SQLVisualExplorer-win-x64.exe
            binary: SQLVisualExplorer.Desktop.exe
          - os: macos-latest
            rid: osx-x64
            artifact: SQLVisualExplorer-osx-x64
            binary: SQLVisualExplorer.Desktop
          - os: macos-latest
            rid: osx-arm64
            artifact: SQLVisualExplorer-osx-arm64
            binary: SQLVisualExplorer.Desktop
          - os: ubuntu-latest
            rid: linux-x64
            artifact: SQLVisualExplorer-linux-x64
            binary: SQLVisualExplorer.Desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish src/SQLVisualExplorer.Desktop/SQLVisualExplorer.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      - name: Rename artifact
        shell: bash
        run: |
          src="publish/${{ matrix.rid }}/${{ matrix.binary }}"
          dst="${{ matrix.artifact }}"
          mv "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/*
